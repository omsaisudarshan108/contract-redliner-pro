app = "contract-redliner-pro"
primary_region = "ewr"   # Newark — close to NYC/NJ

[build]
  dockerfile = "Dockerfile"

[env]
  LLM_PROVIDER = "mock"
  PORT = "8000"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    path = "/health"
    timeout = "5s"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
